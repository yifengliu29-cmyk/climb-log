<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f97316">
<!-- PWA / Add to Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="猫爬架">
<link rel="manifest" href="manifest.json">

<script>
// 注册 Service Worker（PWA 必须）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>

<title>猫爬架</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  --orange:#f97316;
  --orange-light:#fff7ed;
  --orange-mid:#fed7aa;
  --bg:#f8f4f0;
  --bg2:#fff;
  --surface:rgba(255,255,255,0.72);
  --surface2:rgba(255,255,255,0.55);
  --border:rgba(249,115,22,0.12);
  --border2:rgba(0,0,0,0.07);
  --text:#1a1209;
  --text2:#6b5e52;
  --text3:#a89080;
  --shadow:0 4px 24px rgba(249,115,22,0.08),0 1px 4px rgba(0,0,0,0.06);
  --shadow-lg:0 12px 40px rgba(249,115,22,0.14),0 2px 8px rgba(0,0,0,0.08);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(249,115,22,.10) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(249,115,22,.07) 0%,transparent 50%);
  background-attachment:fixed;
  color:var(--text);
  min-height:100vh;
  padding-bottom:80px;
}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none;color:var(--text)}
input::-webkit-calendar-picker-indicator{opacity:.5}

/* ── Header ── */
.header{
  background:rgba(255,255,255,0.80);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding-top:env(safe-area-inset-top);
  box-shadow:0 2px 20px rgba(249,115,22,.08);
}
.header-inner{max-width:100%;margin:0 auto;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,#ff8c42,#f97316);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(249,115,22,.35);
}
.logo-text h1{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-text p{font-size:10px;color:var(--text3);margin-top:1px}
.header-actions{display:flex;gap:6px}
.main{max-width:min(430px,100%);width:100%;margin:0 auto;padding:74px 12px 20px;min-height:100vh}

/* ── Bottom Nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;
  padding:6px 0 calc(6px + env(safe-area-inset-bottom));
  z-index:100;
  box-shadow:0 -2px 20px rgba(249,115,22,.06);
}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;background:none;border:none;color:var(--text3);font-size:10px;font-weight:500;transition:all .2s;cursor:pointer}
.bottom-nav-item.active{color:var(--orange)}
.bottom-nav-item .nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.bottom-nav-item.active .nav-icon svg{stroke:var(--orange)}

/* ── FAB ── */
.fab{
  position:fixed;bottom:88px;right:18px;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#ff9048,#f97316);
  color:#fff;font-size:26px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 24px rgba(249,115,22,.45);
  z-index:90;transition:transform .2s,box-shadow .2s;
}
.fab:active{transform:scale(.94);box-shadow:0 3px 12px rgba(249,115,22,.35)}

/* ── Buttons ── */
.btn{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.btn-gray{background:rgba(255,255,255,0.8);color:var(--text2);border:1px solid var(--border2);backdrop-filter:blur(8px)}
.btn-gray:active{background:rgba(249,115,22,.08);border-color:var(--orange)}
.btn-primary{background:linear-gradient(135deg,#ff9048,#f97316);color:#fff;border:none;box-shadow:0 3px 12px rgba(249,115,22,.3)}
.btn-primary:active{opacity:.92;transform:scale(.98)}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-danger{background:rgba(254,226,226,.6);color:#c0392b;border:1px solid rgba(192,57,43,.15)}
.btn-danger:active{background:rgba(254,202,202,.8)}
.btn-icon{width:38px;height:38px;padding:0;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:15px}
label.btn-icon{display:inline-flex;vertical-align:middle;box-sizing:border-box;overflow:hidden}
.btn-icon svg{pointer-events:none}

/* ── Cards ── */
.card{
  background:var(--surface);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:var(--shadow);
  border-radius:16px;padding:16px;overflow:hidden;box-sizing:border-box;
}
.card-hover{transition:all .25s}
.card-hover:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}

/* ── Stats Grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat-card{
  background:var(--surface);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.75);
  box-shadow:var(--shadow);
  border-radius:16px;padding:14px;
  display:flex;justify-content:space-between;align-items:center;
}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.stat-value{font-size:24px;font-weight:700;color:var(--text)}
.stat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.icon-orange{background:linear-gradient(135deg,#fff7ed,#fed7aa);color:var(--orange)}
.icon-pink{background:linear-gradient(135deg,#fff0f6,#ffd6e8);color:#e05a8a}
.icon-teal{background:linear-gradient(135deg,#f0fdfb,#ccfbf1);color:#0d9488}
.icon-purple{background:linear-gradient(135deg,#faf5ff,#e9d5ff);color:#7c3aed}

/* ── Tabs (Desktop) ── */
.tabs{display:none;margin-bottom:16px;border-bottom:1.5px solid var(--border2);gap:0;overflow-x:auto;padding:0}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text3);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap;margin-bottom:-1.5px}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:600}
@media(min-width:768px){.tabs{display:flex}}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── Charts ── */
.charts-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
.chart-container{position:relative}
canvas{max-width:100%}
.chart-placeholder{display:flex;align-items:center;justify-content:center;height:160px;color:var(--text3);flex-direction:column;gap:8px;font-size:13px}

/* ── Calendar ── */
.calendar-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.calendar-title{font-size:15px;font-weight:700;color:var(--text)}
.calendar-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;text-align:center;width:100%;min-width:0}
.calendar-weekdays span{font-size:11px;color:var(--text3);padding:4px 0;font-weight:600;min-width:0}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;width:100%;min-width:0}
.cal-day{
  aspect-ratio:1;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;font-size:12px;font-weight:500;
  background:rgba(255,255,255,0.55);
  color:var(--text2);
  transition:all .2s;border:1px solid transparent;
  min-width:0;overflow:hidden;
}
.cal-day:active{background:rgba(249,115,22,.12)}
.cal-day.has-session{
  background:linear-gradient(135deg,rgba(255,237,213,.85),rgba(254,215,170,.7));
  border-color:rgba(249,115,22,.35);
  color:var(--orange);font-weight:700;
  box-shadow:0 2px 8px rgba(249,115,22,.15);
}
.cal-day.today{border-color:var(--orange);border-width:1.5px}
.cal-day .route-count{font-size:9px;color:var(--orange);line-height:1;font-weight:700}
.cal-day .gym-name{font-size:8px;color:var(--text3);line-height:1;margin-top:1px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-day.empty{background:transparent;cursor:default;color:var(--text3);opacity:.4}

/* ── History ── */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.filter-bar select{
  background:var(--surface);
  backdrop-filter:blur(12px);
  border:1px solid var(--border2);
  border-radius:10px;padding:9px 12px;
  font-size:13px;color:var(--text2);min-width:110px;
  box-shadow:var(--shadow);
}
.history-item{
  background:var(--surface);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:var(--shadow);
  border-radius:16px;padding:16px;margin-bottom:10px;
  transition:all .2s;position:relative;overflow:hidden;
}
.history-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,#ff9048,#f97316);border-radius:0 2px 2px 0;opacity:.6}
.history-item:active{transform:scale(.99)}
.history-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.history-date{font-size:14px;font-weight:700;color:var(--text)}
.history-gym{color:var(--text3);font-size:12px;margin-left:6px;font-weight:500}
.history-actions{display:flex;gap:6px}
.history-activity{font-size:12px;color:var(--orange);margin-bottom:6px;font-weight:600}
.grades-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.grade-chip{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.grade-v0{background:#dcfce7;color:#166534}
.grade-v1{background:#fed7aa;color:#c2410c}
.grade-v2{background:#fdba74;color:#ea580c}
.grade-v3{background:#fb923c;color:#ea580c}
.grade-v4{background:#f97316;color:#dc2626}
.grade-v5{background:#ea580c;color:#b91c1c}
.grade-v6{background:#f5d0fe;color:#86198f}
.grade-v7{background:#ffddd5;color:#7c2d12}
.grade-v8{background:#fecdd3;color:#9f1239}
.grade-v9{background:#ffe4e6;color:#881337}
.grade-v10{background:#e0e7ff;color:#3730a3}
.grade-k{background:#ccfbf1;color:#0f766e}
.grade-s{background:#dbeafe;color:#1e40af}
.grade-s11{background:#bbf7d0;color:#14532d}
.grade-s12{background:#fef08a;color:#713f12}
.grade-s13{background:#fed7aa;color:#9a3412}
.grade-s14{background:#fca5a5;color:#7f1d1d}
.grade-s15{background:#e0e7ff;color:#3730a3}
.note-text{font-size:12px;color:var(--text3);margin-top:6px}

/* ── Toggle ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:14px;color:var(--text);cursor:pointer}
.toggle-row:last-child{border-bottom:none}
.toggle-row input{display:none}
.toggle-switch{width:44px;height:24px;background:#e5e7eb;border-radius:12px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s}
.toggle-row input:checked + .toggle-switch{background:#f97316}
.toggle-row input:checked + .toggle-switch::after{transform:translateX(20px)}

/* ── Settings Modal (centered, compact) ── */
.modal-center{justify-content:center!important;align-items:center}
.modal-center .modal-box{border-radius:24px;max-height:85vh;overflow-y:auto;animation:none;width:360px}
.settings-box .modal-header{padding-bottom:10px;margin-bottom:12px}
.settings-box .modal-title{font-size:16px}
.settings-box .close-btn{width:28px;height:28px;font-size:14px;border-radius:8px}
.settings-body{padding:4px 0!important}
.settings-section{margin-bottom:12px}
.settings-label{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:6px;padding-left:2px;text-transform:uppercase;letter-spacing:.5px}
.stoggle-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:13px;color:var(--text);cursor:pointer}
.stoggle-row:last-child{border-bottom:none}
.stoggle-row input{display:none}
.grade-range-row{display:flex;gap:8px}
.grade-range-item{flex:1}
.grade-range-hint{font-size:11px;color:var(--text3);margin-bottom:3px;display:block}
.grade-range-item select{width:100%;padding:6px 8px;border-radius:8px;border:1px solid rgba(0,0,0,.1);background:var(--surface);font-size:13px;color:var(--text)}
.btn-sm-danger{margin-top:4px;color:#ef4444;border-color:rgba(239,68,68,.25);font-size:13px}

/* ── Routes ── */
.routes-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.routes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:900px){.routes-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.routes-grid{grid-template-columns:1fr}}
.route-card{
  background:var(--surface);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:var(--shadow);
  border-radius:14px;padding:14px;transition:all .2s;
}
.route-card:hover{border-color:rgba(249,115,22,.3);box-shadow:var(--shadow-lg)}
.route-name{font-weight:600;margin-bottom:6px;color:var(--text)}
.route-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.grade-badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.status-flash{background:rgba(13,148,136,.12);color:#0d9488;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.status-sent{background:rgba(59,130,246,.12);color:#2563eb;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.status-project{background:rgba(249,115,22,.12);color:var(--orange);padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.route-actions{display:flex;gap:6px;margin-top:10px}

/* ── Achievements ── */
.achievements-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:900px){.achievements-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.achievements-grid{grid-template-columns:1fr}}
.ach-card{
  background:var(--surface);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:var(--shadow);
  border-radius:14px;padding:14px;
  display:flex;align-items:center;gap:12px;transition:all .2s;
}
.ach-card.unlocked{border-color:rgba(249,115,22,.3);background:linear-gradient(135deg,rgba(255,255,255,.85),rgba(255,247,237,.7))}
.ach-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:rgba(0,0,0,.05);color:var(--text3)}
.ach-card.unlocked .ach-icon{background:linear-gradient(135deg,#ff9048,#f97316);color:#fff;box-shadow:0 3px 10px rgba(249,115,22,.3)}
.ach-name{font-weight:600;margin-bottom:2px;font-size:13px;color:var(--text)}
.ach-card:not(.unlocked) .ach-name{color:var(--text3)}
.ach-desc{font-size:11px;color:var(--text3)}
.ach-date{font-size:10px;color:var(--orange);margin-top:2px;font-weight:600}
.ach-status{margin-left:auto;font-size:16px;flex-shrink:0}

/* ── Gym stats ── */
.gym-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.gym-grid{grid-template-columns:repeat(2,1fr)}}
.gym-card{
  background:linear-gradient(135deg,rgba(255,247,237,.8),rgba(255,255,255,.6));
  backdrop-filter:blur(12px);
  border:1px solid rgba(249,115,22,.15);
  border-radius:12px;padding:12px;text-align:center;
  box-shadow:var(--shadow);
}
.gym-count{font-size:22px;font-weight:700;color:var(--orange)}
.gym-name{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(60,30,10,.25);display:none;flex-direction:column;justify-content:flex-end;z-index:100;backdrop-filter:blur(8px)}
.modal-overlay.open{display:flex}
.modal-box{
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(32px) saturate(200%);
  -webkit-backdrop-filter:blur(32px) saturate(200%);
  border:1px solid rgba(255,255,255,0.9);
  border-radius:24px 24px 0 0;
  padding:20px 16px;width:100%;max-width:100%;margin:0;
  max-height:88vh;overflow-y:auto;
  animation:slideUp .3s ease;
  box-shadow:0 -8px 40px rgba(249,115,22,.12),0 -2px 8px rgba(0,0,0,.06);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:rgba(0,0,0,.1);border-radius:2px;margin:0 auto 16px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:17px;font-weight:700;color:var(--text)}
.close-btn{background:rgba(0,0,0,.06);border:none;color:var(--text2);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.close-btn:active{background:rgba(249,115,22,.12);color:var(--orange)}

/* ── Form ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:600}
.form-input{
  width:100%;
  background:rgba(248,244,240,.7);
  border:1.5px solid rgba(0,0,0,.09);
  border-radius:10px;padding:11px 14px;
  font-size:15px;color:var(--text);
  transition:border-color .2s,box-shadow .2s;height:46px;
}
.form-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.1)}
/* ── Dynamic row input (check-in) ── */
.grade-rows{display:flex;flex-direction:column;gap:6px}
.grade-row{display:flex;align-items:center;gap:6px}
.grade-row-select{
  flex:0 0 88px;min-width:0;
  background:rgba(248,244,240,.7);
  border:1.5px solid rgba(0,0,0,.09);
  border-radius:10px;padding:0 28px 0 10px;
  font-size:13px;font-weight:600;color:var(--text);
  height:38px;line-height:38px;
  appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23a89080' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 8px center;
  cursor:pointer;
}
.grade-row-select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.1)}
.grade-row-input{
  flex:1;min-width:0;
  background:rgba(248,244,240,.7);
  border:1.5px solid rgba(0,0,0,.09);
  border-radius:10px;padding:0 10px;
  font-size:14px;font-weight:700;color:var(--text);
  height:38px;text-align:center;
}
.grade-row-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.1)}
/* 磕了 X 条 输入框组合 */
.grade-row-input-wrap{
  flex:1;min-width:0;
  display:flex;align-items:center;gap:2px;
  background:rgba(248,244,240,.7);
  border:1.5px solid rgba(0,0,0,.09);
  border-radius:10px;height:38px;padding:0 8px 0 10px;
  transition:border-color .2s,box-shadow .2s;
}
.grade-row-input-wrap:focus-within{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.1)}
.grade-row-prefix,.grade-row-suffix{
  font-size:13px;font-weight:500;color:var(--text3);white-space:nowrap;flex-shrink:0;
}
.grade-row-input-wrap .grade-row-input{
  border:none;background:transparent;border-radius:0;
  height:100%;padding:0 2px;font-size:14px;font-weight:700;text-align:center;
  box-shadow:none;min-width:28px;
}
.grade-row-input-wrap .grade-row-input:focus{border:none;box-shadow:none}
.grade-row-del{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;border:none;transition:all .15s;
  background:rgba(254,226,226,.5);color:#dc2626;
}
.grade-row-del:hover{background:rgba(254,202,202,.8)}
.grade-row-del:active{transform:scale(.88)}
.grade-add-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  font-size:16px;font-weight:400;color:#059669;
  border:1.5px dashed rgba(5,150,105,.35);background:transparent;
  cursor:pointer;transition:all .15s;margin-top:2px;
}
.grade-add-btn:hover{background:rgba(209,250,229,.5);border-color:rgba(5,150,105,.55);transform:scale(1.08)}
.grade-add-btn:active{transform:scale(.92)}

/* ── Collapsible section (check-in) ── */
.section-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text);cursor:pointer;user-select:none;-webkit-user-select:none}
.section-title .collapse-arrow{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;transition:transform .25s ease;flex-shrink:0;color:var(--text3)}
.section-title .collapse-arrow svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.5;fill:none}
.collapsed .collapse-arrow{transform:rotate(-90deg)}
.form-section.collapsed .grade-rows{display:none}
.form-section.collapsed .grade-add-btn{display:none}
.form-section{background:linear-gradient(135deg,rgba(255,247,237,.5),rgba(255,255,255,.4));border:1px solid rgba(249,115,22,.14);border-radius:14px;padding:14px;margin-bottom:12px;overflow:hidden}
.section-badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.grade-inputs{display:grid;gap:6px;margin-top:8px}
.grade-inputs.cols5{grid-template-columns:repeat(5,1fr)}
.grade-inputs.cols4{grid-template-columns:repeat(4,1fr)}
.grade-inputs.cols6{grid-template-columns:repeat(6,1fr)}
@media(max-width:600px){.grade-inputs.cols4{grid-template-columns:repeat(4,1fr)}.grade-inputs.cols5{grid-template-columns:repeat(5,1fr)}}
.grade-input-item{text-align:center}
.grade-input-label{display:block;font-size:11px;font-weight:700;margin-bottom:4px;padding:2px 4px;border-radius:4px;text-align:center}
.grade-input-label.v0{background:#dcfce7;color:#166534}
.grade-input-label.v1{background:#ffedd5;color:#c2410c}
.grade-input-label.v2{background:#fed7aa;color:#ea580c}
.grade-input-label.v3{background:#fdba74;color:#f97316}
.grade-input-label.v4{background:#fb923c;color:#dc2626}
.grade-input-label.v5{background:#f87171;color:#b91c1c}
.grade-input-label.v6{background:#f5d0fe;color:#86198f}
.grade-input-label.v7{background:#ffddd5;color:#7c2d12}
.grade-input-label.v8{background:#fecdd3;color:#9f1239}
.grade-input-label.v9{background:#ffe4e6;color:#881337}
.grade-input-label.v10{background:#e0e7ff;color:#3730a3}
.grade-input-label.kboard{background:#ccfbf1;color:#0f766e}
.grade-input-label.sport{background:#dbeafe;color:#1e40af}
.grade-input-label.s11{background:#bbf7d0;color:#14532d}
.grade-input-label.s12{background:#fef08a;color:#713f12}
.grade-input-label.s13{background:#fed7aa;color:#9a3412}
.grade-input-label.s14{background:#fca5a5;color:#7f1d1d}
.grade-input-label.s15{background:#e0e7ff;color:#3730a3}
.grade-number-input{
  width:100%;
  background:rgba(248,244,240,.7);
  border:1.5px solid rgba(0,0,0,.09);
  border-radius:8px;padding:8px 2px;
  text-align:center;font-size:15px;font-weight:700;
  color:var(--text);height:42px;
}
.grade-number-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(249,115,22,.1)}
.modal-footer{display:flex;gap:12px;margin-top:20px;padding-bottom:env(safe-area-inset-bottom)}
.btn-block{flex:1;padding:14px;border-radius:14px;font-size:15px;font-weight:700}

/* ── Notification ── */
.notif{position:fixed;top:72px;left:16px;right:16px;padding:14px 20px;border-radius:14px;color:#fff;font-weight:600;font-size:14px;z-index:200;animation:slideDown .3s ease;box-shadow:0 6px 24px rgba(0,0,0,.15);text-align:center}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
.notif-success{background:linear-gradient(135deg,#34d399,#10b981)}
.notif-error{background:linear-gradient(135deg,#f87171,#ef4444)}
.notif-info{background:linear-gradient(135deg,#60a5fa,#3b82f6)}
.notif-ach{background:linear-gradient(135deg,#ffa94d,#f97316)}

/* ── Empty ── */
.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:14px}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.5}

/* ── Section heading ── */
.section-heading{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(249,115,22,.25);border-radius:2px}

/* ── Bar chart ── */
.bar-chart-wrap{padding:8px 0}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--text3);width:40px;text-align:right;flex-shrink:0;font-weight:600}
.bar-outer{flex:1;background:rgba(249,115,22,.1);border-radius:6px;height:16px;overflow:hidden}
.bar-inner{height:100%;border-radius:6px;transition:width .6s ease;min-width:3px}
.bar-count{font-size:12px;color:var(--text3);width:28px;flex-shrink:0;font-weight:600}

/* ── Donut chart (compact) ── */
.donut-wrap{display:flex;align-items:center;gap:14px;padding:4px 0}
.donut-svg{flex-shrink:0}
.donut-legend{flex:1}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;color:var(--text2)}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── Line chart ── */
.line-chart-wrap{overflow-x:auto;padding:8px 0}
.line-chart-svg{min-width:100%}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <!-- 头部 -->
          <ellipse cx="12" cy="8" rx="4.5" ry="4"/>
          <!-- 左耳 -->
          <path d="M7.5 5 L6 2 L9 4.5"/>
          <!-- 右耳 -->
          <path d="M16.5 5 L18 2 L15 4.5"/>
          <!-- 眼睛 -->
          <circle cx="10.5" cy="7.5" r="0.6" fill="#fff" stroke="none"/>
          <circle cx="13.5" cy="7.5" r="0.6" fill="#fff" stroke="none"/>
          <!-- 胡须 -->
          <path d="M7 9 L10 9.5"/>
          <path d="M17 9 L14 9.5"/>
          <path d="M7 10.2 L10 10"/>
          <path d="M17 10.2 L14 10"/>
          <!-- 身体 -->
          <path d="M8.5 12 C7 13 6.5 15 7 17 L9 20"/>
          <path d="M15.5 12 C17 13 17.5 15 17 17 L15 20"/>
          <!-- 尾巴 -->
          <path d="M15 20 Q19 20 20 17 Q21 14 18 13"/>
          <!-- 爪子 -->
          <path d="M9 20 L8 22 M9 20 L10 22"/>
          <path d="M15 20 L14 22 M15 20 L16 22"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>猫爬架</h1>
        <p>攀岩记录</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-gray btn-icon" onclick="exportData()" title="导出JSON">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <label class="btn btn-gray btn-icon" for="importFile" title="导入JSON">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </label>
      <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(this)">
      <label class="btn btn-gray btn-icon" for="importExcelFile" title="导入Excel">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/><path d="m13 15 2 2 4-4"/></svg>
      </label>
      <input type="file" id="importExcelFile" style="display:none" accept=".xlsx,.xls" onchange="importExcel(this)">
      <button class="btn btn-gray btn-icon" onclick="openModal('modal-settings')" title="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- Settings Modal (centered) -->
<div class="modal-overlay modal-center" id="modal-settings" onclick="if(event.target===this)closeModal('modal-settings')">
  <div class="modal-box settings-box">
    <div class="modal-header">
      <span class="modal-title">设置</span>
      <button class="close-btn" onclick="closeModal('modal-settings')">✕</button>
    </div>
    <div class="modal-body settings-body">
      <div class="settings-section">
        <div class="settings-label">页面显示内容</div>
        <label class="stoggle-row"><span>难度分布图表</span><input type="checkbox" id="set-show-difficulty" checked><span class="toggle-switch"></span></label>
        <label class="stoggle-row"><span>攀岩类型占比</span><input type="checkbox" id="set-show-type" checked><span class="toggle-switch"></span></label>
        <label class="stoggle-row"><span>常去岩馆</span><input type="checkbox" id="set-show-gym" checked><span class="toggle-switch"></span></label>
        <label class="stoggle-row"><span>每周爬线数量</span><input type="checkbox" id="set-show-progress" checked><span class="toggle-switch"></span></label>
      </div>
      <div class="settings-section">
        <div class="settings-label">难度分布范围</div>
        <div class="grade-range-row">
          <div class="grade-range-item">
            <span class="grade-range-hint">最低</span>
            <select id="set-grade-min">
              <option value="">全部</option><option value="V0">V0</option><option value="V1">V1</option><option value="V2">V2</option><option value="V3">V3</option><option value="V4">V4</option><option value="V5">V5</option><option value="V6">V6</option><option value="V7">V7</option>
            </select>
          </div>
          <div class="grade-range-item">
            <span class="grade-range-hint">最高</span>
            <select id="set-grade-max">
              <option value="">全部</option><option value="V0">V0</option><option value="V1">V1</option><option value="V2">V2</option><option value="V3">V3</option><option value="V4">V4</option><option value="V5">V5</option><option value="V6">V6</option><option value="V7">V7</option>
            </select>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">数据管理</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gray btn-block btn-sm-danger" onclick="clearAllData()">🗑 清空所有数据</button>
          <button class="btn btn-gray btn-block" style="font-size:13px" onclick="openModal('modal-data-info')">📋 数据保存说明</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">安装应用</div>
        <button class="btn btn-block" id="btn-install-pwa" style="background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;font-size:14px;font-weight:600;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px" onclick="installPWA()">
          <span>📱</span><span>添加到主屏幕</span>
        </button>
        <p id="install-hint" style="font-size:11px;color:var(--text3);text-align:center;margin-top:6px;display:none"></p>
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-primary btn-block" onclick="saveAndApplySettings()">💾 保存设置</button>
    </div>
  </div>
</div>

<!-- Floating Action Button -->
<button class="fab" onclick="openCheckIn()">＋</button>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <button class="bottom-nav-item active" onclick="switchTab('dashboard',this)" data-tab="dashboard">
    <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a89080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
    <span>统计</span>
  </button>
  <button class="bottom-nav-item" onclick="switchTab('calendar',this)" data-tab="calendar">
    <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a89080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
    <span>日历</span>
  </button>
  <button class="bottom-nav-item" onclick="switchTab('history',this)" data-tab="history">
    <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a89080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg></span>
    <span>记录</span>
  </button>
  <button class="bottom-nav-item" onclick="switchTab('routes',this)" data-tab="routes">
    <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a89080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></span>
    <span>线路</span>
  </button>
  <button class="bottom-nav-item" onclick="switchTab('achievements',this)" data-tab="achievements">
    <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a89080" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg></span>
    <span>成就</span>
  </button>
</nav>

<!-- Main -->
<main class="main">
  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card card-hover">
      <div><div class="stat-label">总攀爬次数</div><div class="stat-value" id="st-total">0</div></div>
      <div class="stat-icon icon-orange"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 18 9 6 15 13 19 8 21 18"/></svg></div>
    </div>
    <div class="stat-card card-hover">
      <div><div class="stat-label">本月打卡</div><div class="stat-value" id="st-monthly">0</div></div>
      <div class="stat-icon icon-pink"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
    </div>
    <div class="stat-card card-hover">
      <div><div class="stat-label">完成线路</div><div class="stat-value" id="st-routes">0</div></div>
      <div class="stat-icon icon-teal"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    </div>
    <div class="stat-card card-hover">
      <div><div class="stat-label">最高难度</div><div class="stat-value" id="st-max" style="color:#f97316">-</div></div>
      <div class="stat-icon icon-purple"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg></div>
    </div>
  </div>

  <!-- Tabs (Desktop only) -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard',this)" data-tab="dashboard">统计概览</button>
    <button class="tab" onclick="switchTab('calendar',this)" data-tab="calendar">日历视图</button>
    <button class="tab" onclick="switchTab('history',this)" data-tab="history">历史记录</button>
    <button class="tab" onclick="switchTab('routes',this)" data-tab="routes">线路收藏</button>
    <button class="tab" onclick="switchTab('achievements',this)" data-tab="achievements">成就</button>
  </div>

  <!-- Dashboard -->
  <div id="tab-dashboard" class="tab-content active">
    <div class="charts-grid">
      <div class="card">
        <div class="section-heading">难度分布</div>
        <div id="difficulty-chart"></div>
      </div>
      <div class="card">
        <div class="section-heading">攀岩类型占比</div>
        <div id="type-chart"></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="section-heading">常去岩馆</div>
      <div class="gym-grid" id="gym-stats"><div class="empty"><div class="empty-icon">🏢</div>暂无数据</div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="section-heading">每周爬线数量</div>
      <div id="progress-chart"></div>
    </div>
  </div>

  <!-- Calendar -->
  <div id="tab-calendar" class="tab-content">
    <div class="card">
      <div class="calendar-nav">
        <button class="btn btn-gray btn-sm" onclick="changeMonth(-1)">◀ 上月</button>
        <span class="calendar-title" id="cal-title"></span>
        <button class="btn btn-gray btn-sm" onclick="changeMonth(1)">下月 ▶</button>
      </div>
      <div class="calendar-weekdays">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="calendar-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- History -->
  <div id="tab-history" class="tab-content">
    <div class="filter-bar">
      <select id="filter-gym" onchange="renderHistory()">
        <option value="">所有岩馆</option>
      </select>
      <select id="filter-type" onchange="renderHistory()">
        <option value="">所有类型</option>
        <option value="boulder">室内抱石</option>

function loadXLSXFallback(){

  s.src='https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';
  s.onerror=function(){

    console.error('XLSX库加载失败，导入Excel功能不可用');
  };
  document.head.appendChild(s);

</script>
<script>
// ============ DATA ============
const SK = 'climblog_v2';
let db = { sessions:[], routes:[], achievements:[] };
let curMonth = new Date();

const ACHIEVEMENTS_DEF = [
  { id:'first', name:'初次攀岩', desc:'完成第一次打卡', icon:'🏔', check: d => d.sessions.length >= 1 },
  { id:'5times', name:'五次达成', desc:'累计打卡5次', icon:'🔥', check: d => d.sessions.length >= 5 },
  { id:'10times', name:'十次老将', desc:'累计打卡10次', icon:'💪', check: d => d.sessions.length >= 10 },
  { id:'month10', name:'月度十次', desc:'单月打卡10次以上', icon:'📅', check: d => checkMonthlySessions(d.sessions,10) },
  { id:'v3', name:'V3征服者', desc:'完成V3难度线路', icon:'⚡', check: d => checkMaxGrade(d.sessions,'V3') },
  { id:'v4', name:'V4高手', desc:'完成V4难度线路', icon:'👑', check: d => checkMaxGrade(d.sessions,'V4') },
  { id:'v5', name:'V5大师', desc:'完成V5难度线路', icon:'🏆', check: d => checkMaxGrade(d.sessions,'V5') },
  { id:'gyms3', name:'探馆达人', desc:'去过3个不同岩馆', icon:'🗺', check: d => new Set(d.sessions.map(s=>s.gym)).size >= 3 },
  { id:'routes20', name:'线路收藏家', desc:'收藏20条线路', icon:'📚', check: d => d.routes.length >= 20 },
  { id:'routes50', name:'百线达成', desc:'累计完成50条线路', icon:'💯', check: d => countRoutes(d.sessions) >= 50 },
];

function loadDB(){
  try{ const s=localStorage.getItem(SK); if(s) db=JSON.parse(s); }catch(e){}
  // ensure achievements exist
  if(!db.achievements||db.achievements.length===0){
    db.achievements=ACHIEVEMENTS_DEF.map(a=>({...a,unlocked:false,unlockedAt:null}));
    saveDB();
  }
}
function saveDB(){ localStorage.setItem(SK,JSON.stringify(db)); }

// ============ HELPERS ============
function countRoutes(sessions){
  return sessions.reduce((t,s)=>{
    return t + Object.values(s.boulder||{}).reduce((a,b)=>a+b,0)
              + Object.values(s.kboard||{}).reduce((a,b)=>a+b,0)
              + Object.values(s.sport||{}).reduce((a,b)=>a+b,0);
  },0);
}
function checkMonthlySessions(sessions,n){
  const m={};
  sessions.forEach(s=>{ m[s.date.slice(0,7)]=(m[s.date.slice(0,7)]||0)+1; });
  return Object.values(m).some(c=>c>=n);
}
function checkMaxGrade(sessions,grade){
  const order=['V0','V1','V2','V3','V4','V5'];
  const ti=order.indexOf(grade);
  return sessions.some(s=>Object.keys(s.boulder||{}).some(g=>order.indexOf(g)>=ti&&s.boulder[g]>0));
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fmtDate(d){ return d.toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'}); }

// ============ STATS ============
function updateStats(){
  document.getElementById('st-total').textContent = db.sessions.length;
  const m = new Date().toISOString().slice(0,7);
  document.getElementById('st-monthly').textContent = db.sessions.filter(s=>s.date.startsWith(m)).length;
  document.getElementById('st-routes').textContent = countRoutes(db.sessions);
  const grades=['V5','V4','V3','V2','V1'];
  let max='-';
  for(let g of grades){ if(checkMaxGrade(db.sessions,g)){max=g;break;} }
  document.getElementById('st-max').textContent = max;
}

// ============ CHARTS ============
function renderDifficultyChart(){
  // 读取设置中的等级范围
  const st=JSON.parse(localStorage.getItem('climber_settings')||'{}');
  const allGrades=['V0','V1','V2','V3','V4','V5','V6','V7'];
  let minIdx=st.gradeMin?allGrades.indexOf(st.gradeMin):0;
  let maxIdx=st.gradeMax?allGrades.indexOf(st.gradeMax):allGrades.length-1;
  if(minIdx<0)minIdx=0;
  if(maxIdx<0)maxIdx=allGrades.length-1;
  const grades=allGrades.slice(Math.max(minIdx,1),maxIdx+1);
  const counts={};
  grades.forEach(g=>counts[g]=0);
  db.sessions.forEach(s=>grades.forEach(g=>{ if(s.boulder&&s.boulder[g]) counts[g]+=s.boulder[g]; }));
  const max=Math.max(...Object.values(counts),1);
  const colors={V0:'#dcfce7',V1:'#fed7aa',V2:'#fdba74',V3:'#fb923c',V4:'#f97316',V5:'#ea580c',V6:'#f97316',V7:'#ea580c'};
  const html=grades.map(g=>`
    <div class="bar-row">
      <span class="bar-label">${g}</span>
      <div class="bar-outer"><div class="bar-inner" style="width:${(counts[g]/max*100).toFixed(1)}%;background:${colors[g]||'#fed7aa'}"></div></div>
      <span class="bar-count">${counts[g]}</span>
    </div>
  `).join('');
  document.getElementById('difficulty-chart').innerHTML = `<div class="bar-chart-wrap">${html}</div>`;
}

function renderTypeChart(){
  let b=0,k=0,s=0;
  db.sessions.forEach(ss=>{
    b+=Object.values(ss.boulder||{}).reduce((a,c)=>a+c,0);
    k+=Object.values(ss.kboard||{}).reduce((a,c)=>a+c,0);
    s+=Object.values(ss.sport||{}).reduce((a,c)=>a+c,0);
  });
  const total=b+k+s||1;
  const data=[{label:'室内抱石',val:b,color:'#f97316'},{label:'K板',val:k,color:'#fb923c'},{label:'高墙难度',val:s,color:'#ea580c'}];
  
  // Simple SVG donut (compact)
  const r=40, cx=50, cy=50, stroke=14;
  const circ=2*Math.PI*r;
  let offset=0;
  const segs=data.map(d=>{
    const pct=d.val/total;
    const dash=circ*pct;
    const gap=circ*(1-pct);
    const seg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="${stroke}" stroke-dasharray="${dash.toFixed(2)} ${gap.toFixed(2)}" stroke-dashoffset="${(-offset*circ).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"></circle>`;
    offset+=pct;
    return seg;
  }).join('');
  
  const legend=data.map(d=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${d.color}"></div>
      <span>${d.label}</span>
      <span style="margin-left:auto;color:#a89080">${d.val}</span>
    </div>
  `).join('');
  
  document.getElementById('type-chart').innerHTML = `
    <div class="donut-wrap">
      <svg class="donut-svg" width="100" height="100" viewBox="0 0 100 100">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(249,115,22,.1)" stroke-width="${stroke}"></circle>
        ${total>0?segs:''}
        <text x="${cx}" y="${cy+4}" text-anchor="middle" fill="#1a1209" font-size="12" font-weight="700">${total}</text>
      </svg>
      <div class="donut-legend">${legend}</div>
    </div>
  `;
}

function renderProgressChart(){
  if(db.sessions.length===0){
    document.getElementById('progress-chart').innerHTML='<div class="chart-placeholder">📈 打卡后自动生成</div>';
    return;
  }
  // Group by week
  const weeks={};
  db.sessions.forEach(s=>{
    const d=new Date(s.date);
    const y=d.getFullYear();
    const w=Math.ceil((d.getDate()+new Date(y,d.getMonth(),1).getDay())/7);
    const k=`${y}-${String(d.getMonth()+1).padStart(2,'0')}-W${w}`;
    weeks[k]=(weeks[k]||0)+countRoutes([s]);
  });
  const labels=Object.keys(weeks).sort().slice(-12);
  const vals=labels.map(k=>weeks[k]);
  const maxV=Math.max(...vals,1);
  
  const W=560, H=140, pad=36, gw=W-pad*2, gh=H-pad*1.5;
  const pts=labels.map((l,i)=>{
    const x=pad+i*(gw/(labels.length-1||1));
    const y=H-pad-(vals[i]/maxV*gh);
    return {x,y,v:vals[i],l};
  });
  
  // Grid lines
  const gridLines=[0,0.25,0.5,0.75,1].map(p=>{
    const y=H-pad-p*gh;
    const v=Math.round(p*maxV);
    return `<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="rgba(249,115,22,.12)" stroke-width="1"/>
            <text x="${pad-4}" y="${y+4}" text-anchor="end" fill="#a89080" font-size="10">${v}</text>`;
  }).join('');
  
  // Gradient area
  const pathD=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ');
  const areaD=pathD+` L${pts[pts.length-1].x},${H-pad} L${pts[0].x},${H-pad} Z`;
  
  // X labels (show every 2nd)
  const xLabels=pts.map((p,i)=>i%2===0?`<text x="${p.x}" y="${H-4}" text-anchor="middle" fill="#a89080" font-size="9">${p.l.slice(5)}</text>`:'').join('');
  
  // Dots
  const dots=pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#f97316" stroke="rgba(255,255,255,.9)" stroke-width="2"/>`).join('');
  
  document.getElementById('progress-chart').innerHTML=`
    <div class="line-chart-wrap">
      <svg class="line-chart-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
        <defs><linearGradient id="areag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f97316" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="#f97316" stop-opacity="0.0"/>
        </linearGradient></defs>
        ${gridLines}
        <path d="${areaD}" fill="url(#areag)"/>
        <path d="${pathD}" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        ${dots}
        ${xLabels}
      </svg>
    </div>
  `;
}

function renderGymStats(){
  const gc={};
  db.sessions.forEach(s=>{ gc[s.gym]=(gc[s.gym]||0)+1; });
  const sorted=Object.entries(gc).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(sorted.length===0){
    document.getElementById('gym-stats').innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🏢</div>暂无数据</div>';
    return;
  }
  document.getElementById('gym-stats').innerHTML=sorted.map(([g,c])=>`
    <div class="gym-card">
      <div class="gym-count">${c}</div>
      <div class="gym-name">${g}</div>
    </div>
  `).join('');
}

function renderDashboard(){
  renderDifficultyChart();
  renderTypeChart();
  renderProgressChart();
  renderGymStats();
}

// ============ CALENDAR ============
function renderCalendar(){
  const y=curMonth.getFullYear(), m=curMonth.getMonth();
  document.getElementById('cal-title').textContent=`${y}年${m+1}月`;
  
  // 获取当月第一天是周几 (0=周日, 1=周一, ...)
  const firstDayOfWeek=new Date(y,m,1).getDay();
  // 获取当月天数
  const daysInMonth=new Date(y,m+1,0).getDate();
  // 获取上个月天数
  const daysInPrevMonth=new Date(y,m,0).getDate();
  
  const today=new Date();
  
  // 获取当月所有session
  const msessions=db.sessions.filter(s=>{
    const d=new Date(s.date); return d.getFullYear()===y&&d.getMonth()===m;
  });
  
  // 按日期分组session，记录数量和岩馆
  const sdayMap={};
  const sdayGyms={};
  msessions.forEach(s=>{ 
    const d=parseInt(s.date.split('-')[2]); 
    sdayMap[d]=(sdayMap[d]||0)+countRoutes([s]); 
    // 记录岩馆名称（取第一个）
    if(!sdayGyms[d]) sdayGyms[d]=s.gym;
  });
  
  let html='';
  
  // 填充上个月的日期（灰色显示）
  for(let i=0;i<firstDayOfWeek;i++){
    const prevDate=daysInPrevMonth-firstDayOfWeek+i+1;
    html+=`<div class="cal-day empty"><span style="opacity:0.3">${prevDate}</span></div>`;
  }
  
  // 填充当月日期
  for(let d=1;d<=daysInMonth;d++){
    const isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const hasSess=sdayMap[d]>0;
    const gymName=sdayGyms[d]||'';
    // 岩馆名称截断显示
    const displayGym=gymName.length>3?gymName.substring(0,3)+'...':gymName;
    html+=`<div class="cal-day${hasSess?' has-session':''}${isToday?' today':''}" onclick="showDayDetail(${y},${m},${d})">
      <span>${d}</span>
      ${hasSess?`<span class="route-count">${sdayMap[d]}</span>`:''}
      ${hasSess?`<span class="gym-name" title="${gymName}">${displayGym}</span>`:''}
    </div>`;
  }
  
  // 填充下个月的日期，补满6行（42个格子）
  const totalCells=firstDayOfWeek+daysInMonth;
  const remainingCells=42-totalCells;
  for(let d=1;d<=remainingCells;d++){
    html+=`<div class="cal-day empty"><span style="opacity:0.3">${d}</span></div>`;
  }
  
  document.getElementById('cal-grid').innerHTML=html;
}
function changeMonth(d){ curMonth.setMonth(curMonth.getMonth()+d); renderCalendar(); }

function showDayDetail(y,m,day){
  const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const ss=db.sessions.filter(s=>s.date===ds);
  if(!ss.length) return;
  document.getElementById('day-modal-title').textContent=`${ds} 的记录`;
  document.getElementById('day-modal-body').innerHTML=ss.map(s=>`
    <div style="background:rgba(255,247,237,.6);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid rgba(249,115,22,.15)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <strong style="color:#1a1209">${s.gym}</strong>
          <span style="color:#a89080;font-size:13px;margin-left:8px">${s.activity}</span>
        </div>
        <button onclick="deleteSession('${s.id}');closeModal('modal-day')" style="background:rgba(254,226,226,.8);color:#c0392b;border:1px solid rgba(192,57,43,.15);padding:4px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600">删除</button>
      </div>
      ${renderGradeChips(s)}
      ${s.note?`<div style="color:#a89080;font-size:12px;margin-top:6px">📝 ${s.note}</div>`:''}
    </div>
  `).join('');
  openModal('modal-day');
}

  let sessions=[...db.sessions].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(gymF) sessions=sessions.filter(s=>s.gym===gymF);
  if(typeF) sessions=sessions.filter(s=>Object.values(s[typeF]||{}).some(v=>v>0));
  
  if(!sessions.length){

      <div class="history-header">
        <div>
          <span class="history-date">${s.date}</span>

        </div>

function renderGradeChips(s){
  const chips=[];
  // 抱石等级颜色映射（V0-V7）
  const bc={
    V0:'grade-v0',V1:'grade-v1',V2:'grade-v2',V3:'grade-v3',
    V4:'grade-v4',V5:'grade-v5',V6:'grade-v6',V7:'grade-v6'
  };
  Object.entries(s.boulder||{}).forEach(([g,c])=>{ if(c>0) chips.push(`<span class="grade-chip ${bc[g]||'grade-v1'}">${g}×${c}</span>`); });
  Object.entries(s.kboard||{}).forEach(([g,c])=>{ if(c>0) chips.push(`<span class="grade-chip grade-k">${g.replace('KV','K-V')}×${c}</span>`); });
  // 高墙等级颜色（10a-14d + lt10）
  const sc=(g)=>{const n=parseInt(g.replace(/[^0-9]/g,''));return n>=14?'grade-s14':n>=13?'grade-s13':n>=12?'grade-s12':n>=11?'grade-s11':'grade-s';};
  Object.entries(s.sport||{}).forEach(([g,c])=>{ 
    if(c>0) {
      const label = g==='lt10'?'<5.10a':'5.'+g;
      chips.push(`<span class="grade-chip ${sc(g)}">${label}×${c}</span>`); 
    }
  });
  return chips.length?`<div class="grades-row">${chips.join('')}</div>`:'';
}

// ============ DYNAMIC ROW INPUT (check-in) ============
const GRADE_OPTIONS={
  boulder:[['V0','V0'],['V1','V1'],['V2','V2'],['V3','V3'],['V4','V4'],['V5','V5'],['V6','V6'],['V7','V7']],
  kboard:[['KV0','K-V0'],['KV1','K-V1'],['KV2','K-V2'],['KV3','K-V3'],['KV4','K-V4'],['KV5','K-V5'],['KV6','K-V6'],['KV7','K-V7']],
  sport:[['lt10','<5.10a'],['10a','5.10a'],['10b','5.10b'],['10c','5.10c'],['10d','5.10d'],
         ['11a','5.11a'],['11b','5.11b'],['11c','5.11c'],['11d','5.11d'],
         ['12a','5.12a'],['12b','5.12b'],['12c','5.12c'],['12d','5.12d'],
         ['13a','5.13a'],['13b','5.13b'],['13c','5.13c'],['13d','5.13d'],
         ['14a','5.14a'],['14b','5.14b'],['14c','5.14c'],['14d','5.14d']]
};

function addRow(type){
  const container=document.getElementById('rows-'+type);
  if(!container) return;
  // limit max rows to avoid clutter
  if(container.querySelectorAll('.grade-row').length>=20){ notify('最多添加20行','error'); return; }
  const opts=GRADE_OPTIONS[type]||[];
  const optHtml='<option value="">选等级</option>'+opts.map(o=>`<option value="${o[0]}">${o[1]}</option>`).join('');
  const row=document.createElement('div');
  row.className='grade-row';
  row.innerHTML=`<select class="grade-row-select" data-type="${type}">${optHtml}</select>
    <div class="grade-row-input-wrap"><span class="grade-row-prefix">磕了</span><input type="number" class="grade-row-input" data-type="${type}" min="0" value="0"><span class="grade-row-suffix">条</span></div>
    <button type="button" class="grade-row-del" onclick="removeRow(this)" title="删除">×</button>`;
  container.appendChild(row);
}

function removeRow(btn){
  const row=btn.closest('.grade-row');
  const container=row.parentElement;
  // keep at least one row
  if(container.querySelectorAll('.grade-row').length<=1) return;
  row.remove();
}

function collectRows(type){
  const result={};
  const container=document.getElementById('rows-'+type);
  if(!container) return result;
  container.querySelectorAll('.grade-row').forEach(row=>{
    const sel=row.querySelector('.grade-row-select');
    const inp=row.querySelector('.grade-row-input');
    if(!sel||!inp) return;
    const grade=sel.value;
    const val=parseInt(inp.value)||0;
    if(grade&&val>0) result[grade]=val;
  });
  return result;
}

function resetRows(){
  ['boulder','kboard','sport'].forEach(type=>{
    const container=document.getElementById('rows-'+type);
    if(!container) return;
    container.innerHTML='';
    addRow(type);
  });
}

function populateRows(type,dataObj){
  const container=document.getElementById('rows-'+type);
  if(!container||!dataObj) return;
  container.innerHTML='';
  const entries=Object.entries(dataObj);
  if(entries.length===0){ addRow(type); return; }
  entries.forEach(([grade,val])=>{
    const opts=GRADE_OPTIONS[type]||[];
    const optHtml='<option value="">选等级</option>'+opts.map(o=>`<option value="${o[0]}"${o[0]===grade?' selected':''}>${o[1]}</option>`).join('');
    const row=document.createElement('div');
    row.className='grade-row';
    row.innerHTML=`<select class="grade-row-select" data-type="${type}">${optHtml}</select>
      <div class="grade-row-input-wrap"><span class="grade-row-prefix">磕了</span><input type="number" class="grade-row-input" data-type="${type}" min="0" value="${val||0}"><span class="grade-row-suffix">条</span></div>
      <button type="button" class="grade-row-del" onclick="removeRow(this)" title="删除×</button>`;
    container.appendChild(row);
  });
  // always keep one empty row at the end for convenience
  addRow(type);
}

// ============ PWA INSTALL ============
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // 显示按钮
  const btn = document.getElementById('btn-install-pwa');
  if (btn) {
    btn.style.display = 'flex';
    document.getElementById('install-hint').style.display = 'block';
    document.getElementById('install-hint').textContent = '点击可将猫爬架添加到手机主屏幕，像原生 App 一样使用';
  }
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const btn = document.getElementById('btn-install-pwa');
  if (btn) {
    btn.innerHTML = '<span>✅</span><span>已安装到主屏幕</span>';
    btn.style.background = 'linear-gradient(135deg,#22c55e,#16a34a)';
    btn.onclick = null;
    btn.style.cursor = 'default';
  }
  const hint = document.getElementById('install-hint');
  if (hint) hint.textContent = '猫爬架已成功安装！可以在主屏幕找到它 🎉';
});

async function installPWA() {
  if (!deferredPrompt) {
    // 不支持 beforeinstallprompt，给用户手动指引
    const hint = document.getElementById('install-hint');
    if (hint) {
      const ua = navigator.userAgent.toLowerCase();
      if (ua.includes('safari') && !ua.includes('chrome')) {
        hint.textContent = 'iOS: 点击分享图标 → "添加到主屏幕"';
      } else if (ua.includes('chrome')) {
        hint.textContent = 'Chrome: 点右上角 ⋮ 菜单 → "添加到主屏幕" 或 "安装应用"';
      } else {
        hint.textContent = '请用浏览器菜单中的"添加到主屏幕"功能安装';
      }
      hint.style.color = 'var(--orange)';
    }
    return;
  }
  const result = await deferredPrompt.prompt();
  console.log(`Install prompt: ${result.outcome}`);
  deferredPrompt = null;
}

function openCheckIn(){
  // reset form
  document.getElementById('form-checkin').onsubmit=saveCheckIn;
  document.getElementById('ci-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('ci-gym').value='';
  document.getElementById('ci-activity').value='爽爬';
  document.getElementById('ci-note').value='';
  resetRows();
  // 动态生成岩馆选项（从历史记录中提取）
  populateGymList();
  openModal('modal-checkin');
}

function populateGymList(){
  const gyms=[...new Set(db.sessions.map(s=>s.gym).filter(g=>g))];
  const dl=document.getElementById('gym-list');
  dl.innerHTML=gyms.map(g=>`<option value="${g}">`).join('');
}

function saveCheckIn(e){
  e.preventDefault();
  const sess={
    id:uid(), date:document.getElementById('ci-date').value,
    gym:document.getElementById('ci-gym').value,
    activity:document.getElementById('ci-activity').value,
    note:document.getElementById('ci-note').value,
    createdAt:new Date().toISOString(),
    boulder:{}, kboard:{}, sport:{}
  };
  Object.assign(sess.boulder, collectRows('boulder'));
  Object.assign(sess.kboard, collectRows('kboard'));
  Object.assign(sess.sport, collectRows('sport'));
  
  db.sessions.push(sess);
  saveDB();
  closeModal('modal-checkin');
  refreshAll();
  const ach=checkAchievements();
  if(!ach.length) notify('✅ 打卡成功！','success');
}

function editSession(id){
  const s=db.sessions.find(x=>x.id===id);
  if(!s) return;
  document.getElementById('ci-date').value=s.date;
  document.getElementById('ci-gym').value=s.gym;
  document.getElementById('ci-activity').value=s.activity;
  document.getElementById('ci-note').value=s.note||'';
  populateRows('boulder',s.boulder);
  populateRows('kboard',s.kboard);
  populateRows('sport',s.sport);
  document.getElementById('form-checkin').onsubmit=function(e){
    e.preventDefault();
    db.sessions=db.sessions.filter(x=>x.id!==id);
    saveDB();
    saveCheckIn(e);
  };
  openModal('modal-checkin');
}

function deleteSession(id){
  if(!confirm('确定删除这条记录？')) return;
  db.sessions=db.sessions.filter(s=>s.id!==id);
  saveDB();
  refreshAll();
  notify('已删除','info');
}

// ============ ACHIEVEMENTS ============
function renderAchievements(){
  document.getElementById('ach-list').innerHTML=db.achievements.map(a=>`
    <div class="ach-card${a.unlocked?' unlocked':''}">
      <div class="ach-icon">${a.icon}</div>
      <div style="flex:1;min-width:0">
        <div class="ach-name">${a.name}</div>
        <div class="ach-desc">${a.desc}</div>
        ${a.unlocked&&a.unlockedAt?`<div class="ach-date">🔓 ${new Date(a.unlockedAt).toLocaleDateString()}</div>`:''}
      </div>
      <div class="ach-status">${a.unlocked?'✅':'🔒'}</div>
    </div>
  `).join('');
}

function checkAchievements(){
  const newOnes=[];
  db.achievements.forEach(a=>{
    const def=ACHIEVEMENTS_DEF.find(x=>x.id===a.id);
    if(!a.unlocked&&def&&def.check(db)){
      a.unlocked=true; a.unlockedAt=new Date().toISOString();
      newOnes.push(a);
    }
  });
  if(newOnes.length){ saveDB(); renderAchievements(); notifyAchievements(newOnes); }
  return newOnes;
}

function notifyAchievements(list){
  list.forEach((a,i)=>setTimeout(()=>{
    const n=document.createElement('div');
    n.className='notif notif-ach';
    n.innerHTML=`<strong>🎉 成就解锁：${a.name}</strong><br><small>${a.desc}</small>`;
    document.body.appendChild(n);
    setTimeout(()=>n.remove(),4000);
  },i*600));
}

// ============ IMPORT / EXPORT ============
function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`climblog_${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  notify('✅ 数据已导出','success');
}

function importData(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const imp=JSON.parse(e.target.result);
      if(confirm(`导入将覆盖当前 ${db.sessions.length} 条记录，确定吗？`)){
        db=imp;
        saveDB();
        refreshAll();
        notify('✅ 导入成功','success');
      }
    }catch(err){ notify('❌ 文件格式错误','error'); }
  };
  reader.readAsText(file);
  input.value='';
}

// ============ EXCEL IMPORT ============
function importExcel(input){
  console.log('importExcel called, XLSX:', typeof XLSX, 'input:', input);
  if(!input || !input.files){
    notify('❌ 文件选择出错，请重试','error');
    return;
  }
  if(typeof XLSX==='undefined'){
    notify('❌ Excel解析库尚未加载，请检查网络后刷新页面重试','error');
    input.value='';
    return;
  }
  const file=input.files[0];
  if(!file){
    notify('❌ 未选择文件','error');
    return;
  }
  
  // 检查 FileReader 是否可用（某些 iframe 环境可能受限）
  if(typeof FileReader==='undefined'){
    notify('❌ 当前环境不支持文件读取，请使用外部浏览器打开','error');
    input.value='';
    return;
  }
  
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const workbook=XLSX.read(data,{type:'array'});
      const firstSheet=workbook.Sheets[workbook.SheetNames[0]];
      const jsonData=XLSX.utils.sheet_to_json(firstSheet,{header:1});
      
      if(jsonData.length<2){
        notify('❌ Excel文件为空或格式不正确','error');
        return;
      }
      
      // 解析表头
      const headers=jsonData[0];
      const rows=jsonData.slice(1);
      
      // 找到列索引
      const colIndex={
        year:headers.findIndex(h=>h&&h.toString().includes('年份')),
        date:headers.findIndex(h=>h&&h.toString().includes('日期')),
        gym:headers.findIndex(h=>h&&h.toString().includes('岩馆')),
        note:headers.findIndex(h=>h&&h.toString().includes('备注')),
        activity:headers.findIndex(h=>h&&h.toString().includes('活动'))
      };
      
      // 找到难度列
      const gradeCols=[];
      headers.forEach((h,i)=>{
        if(!h) return;
        const headerStr=h.toString().trim();
        // V级
        const vMatch=headerStr.match(/^V(\d+)$/i);
        if(vMatch) gradeCols.push({col:i,type:'boulder',grade:'V'+vMatch[1]});
        // K板
        const kMatch=headerStr.match(/^K-V(\d+)$/i);
        if(kMatch) gradeCols.push({col:i,type:'kboard',grade:'KV'+kMatch[1]});
        // 高墙
        if(headerStr==='<10'||headerStr==='<5.10a') gradeCols.push({col:i,type:'sport',grade:'lt10'});
        const sMatch=headerStr.match(/^(\d+[a-d])$/);
        if(sMatch) gradeCols.push({col:i,type:'sport',grade:sMatch[1]});
      });
      
      const importedSessions=[];
      rows.forEach(row=>{
        if(!row[colIndex.date]) return;
        
        const dateStr=parseDate(row[colIndex.date]);
        if(!dateStr) return;
        
        const session={
          id:uid(),
          date:dateStr,
          gym:row[colIndex.gym]||'未知岩馆',
          activity:parseActivity(row[colIndex.note]),
          note:row[colIndex.note]||'',
          createdAt:new Date().toISOString(),
          boulder:{},kboard:{},sport:{}
        };
        
        // 解析难度数据
        gradeCols.forEach(gc=>{
          const val=parseInt(row[gc.col])||0;
          if(val>0){
            session[gc.type][gc.grade]=val;
          }
        });
        
        importedSessions.push(session);
      });
      
      if(importedSessions.length===0){
        notify('❌ 未能解析到有效数据','error');
        return;
      }
      
      if(confirm(`成功解析 ${importedSessions.length} 条记录，是否导入？\n（将追加到现有记录）`)){
        db.sessions=db.sessions.concat(importedSessions);
        saveDB();
        refreshAll();
        notify(`✅ 成功导入 ${importedSessions.length} 条记录`,'success');
      }
    }catch(err){
      console.error(err);
      notify('❌ Excel解析失败：'+err.message,'error');
    }
  };
  reader.readAsArrayBuffer(file);
  input.value='';
}

function parseDate(dateVal){
  if(!dateVal) return null;
  // 处理Excel日期格式
  if(typeof dateVal==='number'){
    // Excel日期是从1900年1月1日开始的天数
    const excelEpoch=new Date(1899,11,30);
    const date=new Date(excelEpoch.getTime()+dateVal*24*60*60*1000);
    return date.toISOString().split('T')[0];
  }
  // 处理字符串日期
  const dateStr=dateVal.toString();
  // 匹配 "8月31日" 或 "2025年8月31日"
  const match=dateStr.match(/(\d{4})?年?(\d{1,2})月(\d{1,2})日?/);
  if(match){
    const year=match[1]||new Date().getFullYear();
    const month=match[2].padStart(2,'0');
    const day=match[3].padStart(2,'0');
    return `${year}-${month}-${day}`;
  }
  // 尝试直接解析
  const d=new Date(dateStr);
  if(!isNaN(d)) return d.toISOString().split('T')[0];
  return null;
}

function parseActivity(note){
  if(!note) return '爽爬';
  const noteStr=note.toString();
  if(noteStr.includes('公开课')) return '公开课';
  if(noteStr.includes('探馆')) return '探馆';
  if(noteStr.includes('黑练')||noteStr.includes('晚练')) return '黑练';
  if(noteStr.includes('爽爬')||noteStr.includes('爬')) return '爽爬';
  if(noteStr.includes('顶绳课')) return '公开课';
  return '爽爬';
}

// ============ SETTINGS ============
function loadSettings(){
  const s=JSON.parse(localStorage.getItem('climber_settings')||'{}');
  document.getElementById('set-show-difficulty').checked=s.showDifficulty!==false;
  document.getElementById('set-show-type').checked=s.showType!==false;
  document.getElementById('set-show-gym').checked=s.showGym!==false;
  document.getElementById('set-show-progress').checked=s.showProgress!==false;
  document.getElementById('set-grade-min').value=s.gradeMin||'';
  document.getElementById('set-grade-max').value=s.gradeMax||'';
  applySettings();
}

function saveSettings(){
  const s={
    showDifficulty:document.getElementById('set-show-difficulty').checked,
    showType:document.getElementById('set-show-type').checked,
    showGym:document.getElementById('set-show-gym').checked,
    showProgress:document.getElementById('set-show-progress').checked,
    gradeMin:document.getElementById('set-grade-min').value,
    gradeMax:document.getElementById('set-grade-max').value
  };
  localStorage.setItem('climber_settings',JSON.stringify(s));
  applySettings();
}

function applySettings(){
  const s=JSON.parse(localStorage.getItem('climber_settings')||'{}');
  // 找到难度分布卡片
  const diffCard=document.querySelector('#difficulty-chart')?.closest('.card');
  if(diffCard) diffCard.style.display=(s.showDifficulty!==false)?'':'none';
  // 攀岩类型占比
  const typeCard=document.querySelector('#type-chart')?.closest('.card');
  if(typeCard) typeCard.style.display=(s.showType!==false)?'':'none';
  // 常去岩馆
  const gymCard=document.querySelector('#gym-stats')?.closest('.card');
  if(gymCard) gymCard.style.display=(s.showGym!==false)?'':'none';
  // 每周爬线数量
  const progCard=document.querySelector('#progress-chart')?.closest('.card');
  if(progCard) progCard.style.display=(s.showProgress!==false)?'':'none';
}

function clearAllData(){
  if(!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
  db={sessions:[],routes:[],achievements:[]};
  saveDB();
  refreshAll();
  notify('🗑 数据已清空','success');
  closeModal('modal-settings');
}

function saveAndApplySettings(){
  saveSettings();
  notify('✅ 设置已保存','success');
  closeModal('modal-settings');
}

// ============ UI UTILS ============
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function toggleSection(id){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('collapsed');
}

function switchTab(name, btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-item').forEach(t=>{
    t.classList.remove('active');
    t.querySelectorAll('svg').forEach(s=>s.setAttribute('stroke','#a89080'));
  });
  document.getElementById('tab-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.tab[data-tab="'+name+'"], .bottom-nav-item[data-tab="'+name+'"]').forEach(el=>{
    el.classList.add('active');
    el.querySelectorAll('svg').forEach(s=>s.setAttribute('stroke','#f97316'));
  });
  if(name==='dashboard') renderDashboard();
  if(name==='calendar') renderCalendar();
  if(name==='history') renderHistory();
  if(name==='routes') renderRoutes();
  if(name==='achievements') renderAchievements();
}

function notify(msg, type){
  const n=document.createElement('div');
  n.className=`notif notif-${type}`;
  n.textContent=msg;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),3000);
}

function refreshAll(){
  updateStats();
  renderDashboard();
  renderCalendar();
  renderHistory();
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); });
});

// ============ INIT ============
loadDB();
updateStats();
renderDashboard();
renderCalendar();
renderHistory();
renderRoutes();
renderAchievements();
loadSettings();
</script>
