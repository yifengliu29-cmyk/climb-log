<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimbLog - 攀岩记录</title>
    <meta name="theme-color" content="#0c0a09">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rock: {
                            50: '#f5f5f4',
                            100: '#e7e5e4',
                            200: '#d6d3d1',
                            300: '#a8a29e',
                            400: '#78716c',
                            500: '#57534e',
                            600: '#44403c',
                            700: '#292524',
                            800: '#1c1917',
                            900: '#0c0a09',
                        },
                        climb: {
                            orange: '#f97316',
                            pink: '#ec4899',
                            teal: '#14b8a6',
                            purple: '#8b5cf6',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1c1917 0%, #292524 50%, #44403c 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .btn-primary { background: linear-gradient(135deg, #f97316 0%, #ec4899 100%); }
        .btn-primary:hover { opacity: 0.9; transform: scale(1.02); }
        .tab-active { border-bottom: 3px solid #f97316; color: #f97316; }
        .difficulty-badge { 
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 48px; height: 28px; border-radius: 6px; font-weight: 600; font-size: 12px;
        }
        .boulder-v0 { background: #dcfce7; color: #166534; }
        .boulder-v1 { background: #dbeafe; color: #1e40af; }
        .boulder-v2 { background: #fef3c7; color: #92400e; }
        .boulder-v3 { background: #fed7aa; color: #9a3412; }
        .boulder-v4 { background: #fecaca; color: #991b1b; }
        .boulder-v5 { background: #e9d5ff; color: #6b21a8; }
        .kboard { background: #ccfbf1; color: #0f766e; }
        .sport { background: #c7d2fe; color: #3730a3; }
        .modal { backdrop-filter: blur(8px); }
        .achievement-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body class="bg-rock-900 text-white min-h-screen">
    <!-- Header -->
    <header class="gradient-bg border-b border-rock-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl btn-primary flex items-center justify-center">
                        <i class="fas fa-mountain text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">ClimbLog</h1>
                        <p class="text-xs text-rock-300">攀岩记录</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="exportData()" class="px-4 py-2 rounded-lg bg-rock-700 hover:bg-rock-600 text-sm font-medium transition-colors">
                        <i class="fas fa-download mr-2"></i>导出
                    </button>
                    <label class="px-4 py-2 rounded-lg bg-rock-700 hover:bg-rock-600 text-sm font-medium transition-colors cursor-pointer">
                        <i class="fas fa-upload mr-2"></i>导入
                        <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(this)">
                    </label>
                    <button onclick="openModal('checkInModal')" class="px-4 py-2 rounded-lg btn-primary text-white text-sm font-medium">
                        <i class="fas fa-plus mr-2"></i>打卡
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-rock-800 rounded-xl p-4 card-hover border border-rock-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-rock-400 text-sm">总攀爬次数</p>
                        <p class="text-2xl font-bold text-white" id="totalSessions">0</p>
                    </div>
                    <div class="w-12 h-12 rounded-xl bg-climb-orange/20 flex items-center justify-center">
                        <i class="fas fa-layer-group text-climb-orange text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-rock-800 rounded-xl p-4 card-hover border border-rock-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-rock-400 text-sm">本月打卡</p>
                        <p class="text-2xl font-bold text-white" id="monthlySessions">0</p>
                    </div>
                    <div class="w-12 h-12 rounded-xl bg-climb-pink/20 flex items-center justify-center">
                        <i class="fas fa-calendar-check text-climb-pink text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-rock-800 rounded-xl p-4 card-hover border border-rock-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-rock-400 text-sm">完成线路</p>
                        <p class="text-2xl font-bold text-white" id="totalRoutes">0</p>
                    </div>
                    <div class="w-12 h-12 rounded-xl bg-climb-teal/20 flex items-center justify-center">
                        <i class="fas fa-check-circle text-climb-teal text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-rock-800 rounded-xl p-4 card-hover border border-rock-700">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-rock-400 text-sm">最高难度</p>
                        <p class="text-2xl font-bold text-climb-orange" id="maxDifficulty">-</p>
                    </div>
                    <div class="w-12 h-12 rounded-xl bg-climb-purple/20 flex items-center justify-center">
                        <i class="fas fa-trophy text-climb-purple text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="border-b border-rock-700 mb-6">
            <nav class="flex gap-6">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="tab-active pb-3 text-sm font-medium transition-colors">
                    <i class="fas fa-chart-pie mr-2"></i>统计概览
                </button>
                <button onclick="switchTab('calendar')" id="tab-calendar" class="pb-3 text-rock-400 hover:text-white text-sm font-medium transition-colors">
                    <i class="fas fa-calendar-alt mr-2"></i>日历视图
                </button>
                <button onclick="switchTab('history')" id="tab-history" class="pb-3 text-rock-400 hover:text-white text-sm font-medium transition-colors">
                    <i class="fas fa-history mr-2"></i>历史记录
                </button>
                <button onclick="switchTab('routes')" id="tab-routes" class="pb-3 text-rock-400 hover:text-white text-sm font-medium transition-colors">
                    <i class="fas fa-route mr-2"></i>线路收藏
                </button>
                <button onclick="switchTab('achievements')" id="tab-achievements" class="pb-3 text-rock-400 hover:text-white text-sm font-medium transition-colors">
                    <i class="fas fa-medal mr-2"></i>成就
                </button>
            </nav>
        </div>

        <!-- Dashboard Tab -->
        <div id="content-dashboard" class="space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-rock-800 rounded-xl p-6 border border-rock-700">
                    <h3 class="text-lg font-semibold mb-4">难度分布</h3>
                    <canvas id="difficultyChart" height="200"></canvas>
                </div>
                <div class="bg-rock-800 rounded-xl p-6 border border-rock-700">
                    <h3 class="text-lg font-semibold mb-4">攀岩类型占比</h3>
                    <canvas id="typeChart" height="200"></canvas>
                </div>
            </div>
            <div class="bg-rock-800 rounded-xl p-6 border border-rock-700">
                <h3 class="text-lg font-semibold mb-4">进步曲线</h3>
                <canvas id="progressChart" height="100"></canvas>
            </div>
            <div class="bg-rock-800 rounded-xl p-6 border border-rock-700">
                <h3 class="text-lg font-semibold mb-4">常去岩馆</h3>
                <div id="gymStats" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </div>
        </div>

        <!-- Calendar Tab -->
        <div id="content-calendar" class="hidden space-y-6">
            <div class="bg-rock-800 rounded-xl p-6 border border-rock-700">
                <div class="flex items-center justify-between mb-4">
                    <button onclick="changeMonth(-1)" class="p-2 rounded-lg hover:bg-rock-700">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <h3 class="text-lg font-semibold" id="calendarMonth"></h3>
                    <button onclick="changeMonth(1)" class="p-2 rounded-lg hover:bg-rock-700">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <div class="grid grid-cols-7 gap-2 text-center mb-2">
                    <div class="text-rock-400 text-sm py-2">日</div>
                    <div class="text-rock-400 text-sm py-2">一</div>
                    <div class="text-rock-400 text-sm py-2">二</div>
                    <div class="text-rock-400 text-sm py-2">三</div>
                    <div class="text-rock-400 text-sm py-2">四</div>
                    <div class="text-rock-400 text-sm py-2">五</div>
                    <div class="text-rock-400 text-sm py-2">六</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
            </div>
        </div>

        <!-- History Tab -->
        <div id="content-history" class="hidden space-y-4">
            <div class="flex gap-4 mb-4">
                <select id="filterGym" onchange="renderHistory()" class="bg-rock-800 border border-rock-700 rounded-lg px-4 py-2 text-sm">
                    <option value="">所有岩馆</option>
                </select>
                <select id="filterType" onchange="renderHistory()" class="bg-rock-800 border border-rock-700 rounded-lg px-4 py-2 text-sm">
                    <option value="">所有类型</option>
                    <option value="boulder">室内抱石</option>
                    <option value="kboard">K板</option>
                    <option value="sport">高墙难度</option>
                </select>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>

        <!-- Routes Tab -->
        <div id="content-routes" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-semibold">我的线路收藏</h3>
                <button onclick="openModal('routeModal')" class="px-4 py-2 rounded-lg btn-primary text-white text-sm">
                    <i class="fas fa-plus mr-2"></i>添加线路
                </button>
            </div>
            <div id="routesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <!-- Achievements Tab -->
        <div id="content-achievements" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="achievementsList"></div>
        </div>
    </main>

    <!-- Check In Modal -->
    <div id="checkInModal" class="modal fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
        <div class="bg-rock-800 rounded-2xl p-6 w-full max-w-2xl mx-4 border border-rock-700 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">打卡记录</h2>
                <button onclick="closeModal('checkInModal')" class="text-rock-400 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="checkInForm" onsubmit="saveCheckIn(event)">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm text-rock-400 mb-2">日期</label>
                        <input type="date" id="checkDate" required class="w-full bg-rock-900 border border-rock-700 rounded-lg px-4 py-2 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-rock-400 mb-2">岩馆</label>
                        <input type="text" id="checkGym" list="gymList" required placeholder="选择或输入岩馆" class="w-full bg-rock-900 border border-rock-700 rounded-lg px-4 py-2 text-white">
                        <datalist id="gymList">
                            <option value="羽石">
                            <option value="山宁芙">
                            <option value="擎天">
                            <option value="普岚">
                        </datalist>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-rock-400 mb-2">活动类型</label>
                    <select id="checkActivity" class="w-full bg-rock-900 border border-rock-700 rounded-lg px-4 py-2 text-white">
                        <option value="爬">爬</option>
                        <option value="公开课">公开课</option>
                        <option value="探馆">探馆</option>
                        <option value="晚练">晚练</option>
                        <option value="顶绳课">顶绳课</option>
                        <option value="毕业啦">毕业啦</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-rock-400 mb-2">备注</label>
                    <input type="text" id="checkNote" placeholder="可选备注" class="w-full bg-rock-900 border border-rock-700 rounded-lg px-4 py-2 text-white">
                </div>

                <!-- Boulder Section -->
                <div class="mb-6 p-4 bg-rock-900/50 rounded-xl border border-rock-700">
                    <h3 class="font-semibold mb-3 flex items-center">
                        <span class="difficulty-badge boulder-v2 mr-2">抱石</span>
                        室内抱石 (V1-V5)
                    </h3>
                    <div class="grid grid-cols-5 gap-2" id="boulderInputs"></div>
                </div>

                <!-- K-Board Section -->
                <div class="mb-6 p-4 bg-rock-900/50 rounded-xl border border-rock-700">
                    <h3 class="font-semibold mb-3 flex items-center">
                        <span class="difficulty-badge kboard mr-2">K板</span>
                        K板训练
                    </h3>
                    <div class="grid grid-cols-4 gap-2" id="kboardInputs"></div>
                </div>

                <!-- Sport Section -->
                <div class="mb-6 p-4 bg-rock-900/50 rounded-xl border border-rock-700">
                    <h3 class="font-semibold mb-3 flex items-center">
                        <span class="difficulty-badge sport mr-2">高墙</span>
                        高墙难度
                    </h3>
                    <div class="grid grid-cols-5 gap-2" id="sportInputs"></div>
                </div>

                <div class="flex gap-3">
                    <button type="button" onclick="closeModal('checkInModal')" class="flex-1 py-3 rounded-xl bg-rock-700 hover:bg-rock-600 font-medium transition-colors">
                        取消
                    </button>
                    <button type="submit" class="flex-1 py-3 rounded-xl btn-primary text-white font-medium">
                        保存记录
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Route Modal -->
    <div id="routeModal" class="modal fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
        <div class="bg-rock-800 rounded-2xl p-6 w-full max-w-md mx-4 border border-rock-700">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">添加线路</h2>
                <button onclick="closeModal('routeModal')" class="text-rock-400 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="routeForm" onsubmit="saveRoute(event)">
                <div class="mb-4">
                    <label class="block text-sm text-rock-400 mb-2">线路名称</label>
                    <input type="text" id="routeName" required placeholder="线路名称或编号" class="w-full bg-rock-900 border border-rock-700 rounded-lg px-4 py-2 text-white">
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm text-rock-400 mb-2">类型</label>
                        <select id="routeType" class="w-full bg-rock-900 border border-rock-700 rounded-lg px-4 py-2 text-white">
                            <option value="boulder">室内抱石</option>
                            <option value="kboard">K板</option>
                            <option value="sport">高墙难度</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-rock-400 mb-2">难度</label>
                        <input type="text" id="routeGrade" required placeholder="如: V3" class="w-full bg-rock-900 border border-rock-700 rounded-lg px-4 py-2 text-white">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-rock-400 mb-2">岩馆</label>
                    <input type="text" id="routeGym" placeholder="岩馆名称" class="w-full bg-rock-900 border border-rock-700 rounded-lg px-4 py-2 text-white">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-rock-400 mb-2">颜色/特征</label>
                    <input type="text" id="routeColor" placeholder="如: 红色大造型" class="w-full bg-rock-900 border border-rock-700 rounded-lg px-4 py-2 text-white">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-rock-400 mb-2">完成状态</label>
                    <select id="routeStatus" class="w-full bg-rock-900 border border-rock-700 rounded-lg px-4 py-2 text-white">
                        <option value="flash">Flash (一次过)</option>
                        <option value="sent">Sent (多次尝试)</option>
                        <option value="project">Project (未完成)</option>
                    </select>
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-rock-400 mb-2">备注</label>
                    <textarea id="routeNote" rows="2" placeholder="动作要点、beta等" class="w-full bg-rock-900 border border-rock-700 rounded-lg px-4 py-2 text-white resize-none"></textarea>
                </div>
                <div class="flex gap-3">
                    <button type="button" onclick="closeModal('routeModal')" class="flex-1 py-3 rounded-xl bg-rock-700 hover:bg-rock-600 font-medium transition-colors">
                        取消
                    </button>
                    <button type="submit" class="flex-1 py-3 rounded-xl btn-primary text-white font-medium">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
